name: nux
base: core22
version: '0.3.0'
summary: NUX - Production-Grade Linux CLI Manager
description: |
  NUX is a comprehensive CLI for Linux system administration,
  offering real-time monitoring, disk management, security auditing,
  service and network management, AI agent integration, and more.

grade: stable
confinement: strict

apps:
  nux:
    command: bin/nux
    plugs:
      - network
      - network-bind
      - network-control
      - system-observe
      - hardware-observe
      - mount-observe
      - process-control
      - firewall-control

parts:
  nux:
    plugin: go
    go-channel: 1.24/stable
    source: .
    build-packages:
      - build-essential
    stage-packages:
      - iproute2
      - nftables
